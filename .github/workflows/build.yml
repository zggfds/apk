name: Build Flet APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Установка flet и зависимостей для сборки
          pip install flet requests

      - name: Fix Git Dubious Ownership
        run: git config --global --add safe.directory '*'

      - name: Build APK
        run: |
          # Команда сборки. Она автоматически подтянет требования из requirements.txt, 
          # но мы также передаем их явно для надежности.
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hoshino-messenger-apk
          path: build/apk/*.apk